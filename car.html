    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #05050A;
            color: #F0F0F0;
        }
        .angel-bg {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030307, #000000);
            min-height: 100vh;
        }
        .angel-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        .car-detail-card {
            background: #0E0E14;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 40px;
            margin: 30px 0 40px;
        }
        .car-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .car-detail-image {
            width: 100%;
            height: 400px;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .car-detail-info h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #FFFFFF 0%, #D4AF37 70%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .brand-tag {
            display: inline-block;
            background: rgba(212, 175, 55, 0.15);
            padding: 4px 16px;
            border-radius: 30px;
            color: #D4AF37;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .detail-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }
        .spec-item {
            background: #18181F;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #26262E;
        }
        .spec-item .label {
            color: #aaa;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .spec-item .value {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 5px;
            color: #D4AF37;
        }
        .price-big {
            font-size: 2.5rem;
            font-weight: 800;
            color: #D4AF37;
            margin: 25px 0;
        }
        
        #loadingMessage {
            text-align: center;
            padding: 40px;
        }
        #loadingMessage i {
            font-size: 2rem;
            color: #D4AF37;
        }
        
        @media (max-width: 768px) {
            .car-detail-grid {
                grid-template-columns: 1fr;
            }
            .car-detail-image {
                height: 250px;
            }
            .detail-specs {
                grid-template-columns: 1fr;
            }
            .car-detail-info h1 {
                font-size: 1.8rem;
            }
            .price-big {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body class="angel-bg">

    <div class="car-detail-card">
        <div id="loadingMessage">
            <i class="fas fa-spinner fa-spin"></i>

        </div>
        
        <div id="carContent" style="display:none;">
            <div class="car-detail-grid">

                    <div class="detail-specs">

                            <div class="label">Год выпуска</div>

                        </div>
                        <div class="spec-item">

                        </div>
                        <div class="spec-item">

                        </div>
                        <div class="spec-item">

                        </div>
                        <div class="spec-item">

                        <div class="spec-item">

                        </div>
                    </div>
                    
                    <div class="price-big" id="carPrice"></div>

            </div>

    </div>

    function getCarIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return parseInt(params.get('id'));
    }

    function loadCarDetail() {
        const carId = getCarIdFromUrl();
        if (!carId) {
            document.getElementById('loadingMessage').innerHTML = `
                <i class="fas fa-exclamation-circle" style="color: #D4AF37; font-size: 3rem;"></i>
                <p style="margin-top:20px; color: #D4AF37;">❌ Автомобиль не найден</p>
            `;
            return;
        }
        
        const car = carsDatabase.find(c => c.id === carId);
        
        if (!car) {
            document.getElementById('loadingMessage').innerHTML = `
                <i class="fas fa-exclamation-circle" style="color: #D4AF37; font-size: 3rem;"></i>
                <p style="margin-top:20px; color: #D4AF37;">❌ Автомобиль не найден</p>
            `;
            return;
        }
        
        displayCarDetails(car);
    }

    function displayCarDetails(car) {
        document.getElementById('loadingMessage').style.display = 'none';
        document.getElementById('carContent').style.display = 'block';
        
        document.getElementById('carName').textContent = car.name;
        document.getElementById('carBrand').textContent = `🏷️ ${car.brand}`;
        document.getElementById('carYear').textContent = car.year;
        document.getElementById('carHp').textContent = `${car.hp} л.с.`;
        document.getElementById('carEngine').textContent = car.engine;
        document.getElementById('carPrice').textContent = car.priceStr;
        document.getElementById('carImage').style.backgroundImage = `url('${car.img}')`;
        
        document.getElementById('carAcceleration').textContent = car.acceleration || '-';
        document.getElementById('carMaxSpeed').textContent = car.maxSpeed || '-';
        
        document.title = `${car.name} | ПРИМИАЛЬНЫЙ АВТОСОЛОН`;
    }

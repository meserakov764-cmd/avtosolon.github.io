<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Премиум автосалон</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #05050A;
            color: #F0F0F0;
        }

        .angel-bg {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030307, #000000);
            position: relative;
        }

        .angel-bg::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 80%, rgba(212, 175, 55, 0.08), transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .angel-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
        }

        .hero-section {
            padding: 45px 0 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.35);
            margin-bottom: 30px;
        }

        .brand {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
        }

        .logo h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #FFFFFF 0%, #D4AF37 70%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.75rem;
            letter-spacing: 2.5px;
            color: #D4AF37;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .nav-button-group {
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
            margin: 20px 0 20px;
        }

        .primary-nav-btn {
            background: transparent;
            border: 1.5px solid #D4AF37;
            padding: 12px 36px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: #D4AF37;
            cursor: pointer;
            transition: 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
        }

        .primary-nav-btn i {
            font-size: 1.1rem;
        }

        .primary-nav-btn:hover {
            background: #D4AF37;
            color: #05050A;
            box-shadow: 0 0 12px rgba(212,175,55,0.5);
            transform: translateY(-2px);
        }

        .filter-bar {
            background: #0C0C12;
            padding: 18px 24px;
            border-radius: 48px;
            margin: 25px 0 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #22212A;
        }

        .filter-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .filter-select, .price-input {
            background: #18181F;
            border: 1px solid #33323D;
            padding: 10px 18px;
            border-radius: 40px;
            color: white;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        .price-input {
            width: 130px;
        }

        .reset-filter {
            background: none;
            border: 1px solid #555;
            padding: 8px 22px;
            border-radius: 40px;
            color: #ccc;
            cursor: pointer;
            transition: 0.2s;
        }
        .reset-filter:hover {
            border-color: #D4AF37;
            color: #D4AF37;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 32px;
            margin: 40px 0 50px;
        }

        .car-card {
            background: #0E0E14;
            border-radius: 28px;
            overflow: hidden;
            transition: 0.25s ease;
            border: 1px solid rgba(212, 175, 55, 0.2);
            cursor: pointer;
        }

        .car-card:hover {
            transform: translateY(-6px);
            border-color: #D4AF37;
            box-shadow: 0 20px 30px -12px black;
        }

        .card-img {
            height: 210px;
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 12px;
        }

        .year-badge {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #D4AF37;
        }

        .card-content {
            padding: 18px 20px 24px;
        }

        .car-name {
            font-size: 1.45rem;
            font-weight: 700;
        }

        .car-specs {
            display: flex;
            gap: 16px;
            font-size: 0.75rem;
            color: #aaa;
            margin: 10px 0;
            border-top: 1px solid #26262E;
            padding-top: 10px;
        }

        .price {
            font-size: 1.55rem;
            font-weight: 800;
            color: #D4AF37;
            margin: 10px 0 15px;
        }

        .btn-detail {
            background: none;
            border: 1px solid #D4AF37;
            border-radius: 40px;
            padding: 8px 0;
            font-weight: 700;
            color: #D4AF37;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-detail:hover {
            background: #D4AF37;
            color: #05050A;
        }

        .modal-contact {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(6px);
        }
        .modal-card {
            background: #0F0F16;
            max-width: 500px;
            width: 90%;
            border-radius: 40px;
            padding: 32px;
            border: 1px solid #D4AF37;
            position: relative;
        }
        .modal-card h3 {
            color: #D4AF37;
            margin-bottom: 20px;
        }
        .modal-card input, .modal-card textarea {
            width: 100%;
            background: #1A1A22;
            border: 1px solid #333;
            padding: 12px 16px;
            border-radius: 30px;
            color: white;
            margin-bottom: 18px;
        }
        .close-modal {
            position: absolute;
            top: 18px;
            right: 24px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
        }
        .send-msg {
            background: #D4AF37;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
        }

        .contacts-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-top: 50px;
            padding: 30px 0;
            border-top: 1px solid #252530;
            gap: 20px;
        }
        @media (max-width: 720px) {
            .angel-container { padding: 0 16px; }
            .primary-nav-btn { padding: 10px 20px; font-size: 0.85rem; }
        }
    </style>
</head>
<body class="angel-bg">
<div class="angel-container">
    <div class="hero-section">
        <div class="brand">
            <div class="logo">
                <h1>ПРЕМИАЛЬНЫЙ АВТОСАЛОН</h1>
            </div>
        </div>

        <div class="nav-button-group">
            <button class="primary-nav-btn" id="scrollToCatalogBtn"><i class="fas fa-list-ul"></i> Каталог</button>
            <button class="primary-nav-btn" id="openContactModalBtn"><i class="fas fa-headset"></i> Связь</button>
        </div>
    </div>

    <div class="filter-bar">
        <div class="filter-group">
            <select id="brandFilter" class="filter-select">
                <option value="all">Все бренды</option>
                <option value="Ferrari">Ferrari</option>
                <option value="Lamborghini">Lamborghini</option>
                <option value="Porsche">Porsche</option>
                <option value="Aston Martin">Aston Martin</option>
                <option value="McLaren">McLaren</option>
                <option value="Mercedes">Mercedes-Benz</option>
                <option value="BMW">BMW</option>
                <option value="Audi">Audi</option>
                <option value="Nissan">Nissan</option>
                <option value="Chevrolet">Chevrolet</option>
                <option value="Bentley">Bentley</option>
                <option value="Maserati">Maserati</option>
                <option value="Rolls-Royce">Rolls-Royce</option>
            </select>
            <div class="price-range">
                <input type="number" id="minPrice" placeholder="Цена от" class="price-input" value="0">
                <span>—</span>
                <input type="number" id="maxPrice" placeholder="Цена до" class="price-input" value="50000000">
            </div>
        </div>
        <button id="resetFilters" class="reset-filter">Сбросить фильтр</button>
    </div>

    <h2 style="font-size: 1.9rem; font-weight: 600;" id="catalogAnchor">⚡ НАША КОЛЛЕКЦИЯ</h2>
    <div class="inventory-grid" id="carsGrid"></div>

    <div class="contacts-row">
        <div><i class="fas fa-phone-alt"></i> <strong>ТЕЛЕФОН</strong> +7 (495) 123-45-67</div>
        <div><i class="fas fa-envelope"></i> <strong>EMAIL</strong> info@saloncar.ru</div>
        <div><i class="fas fa-map-marker-alt"></i> <strong>АДРЕС</strong> г. Москва, ул. Автомобильная, 10</div>
        <div><i class="fab fa-instagram"></i> <i class="fab fa-telegram"></i> <i class="fab fa-youtube"></i> <strong>Соцсети</strong></div>
    </div>
    <div style="text-align: center; padding: 30px 0 40px; font-size: 0.7rem;">Премиум автомобили с гарантией</div>
</div>

<div id="contactModal" class="modal-contact">
    <div class="modal-card">
        <span class="close-modal" id="closeModalBtn">&times;</span>
        <h3><i class="fas fa-envelope"></i> Связь с салоном</h3>
        <input type="text" id="contactCarModel" placeholder="Марка и модель автомобиля">
        <textarea id="contactQuestion" rows="3" placeholder="Ваш вопрос..."></textarea>
        <input type="tel" id="contactPhone" placeholder="Номер телефона">
        <button id="sendContactBtn" class="send-msg">Отправить</button>
    </div>
</div>

<script>
    const carsDatabase = [
        { id: 1, name: "Ferrari F8 Tributo", brand: "Ferrari", year: 2023, hp: 720, priceNum: 32500000, priceStr: "32 500 000 ₽", engine: "3.9L V8", img: "1.jpg", description: "Ferrari F8 Tributo - это совершенство итальянского суперкара. Оснащен 3.9-литровым V8 с двойным турбонаддувом, развивающим 720 л.с. Разгон до 100 км/ч за 2.9 секунды. Максимальная скорость - 340 км/ч." },
        { id: 2, name: "Porsche 911 Turbo S", brand: "Porsche", year: 2023, hp: 650, priceNum: 24200000, priceStr: "24 200 000 ₽", engine: "3.8L H6", img: "2.jpg", description: "Porsche 911 Turbo S - легендарный спорткар с полным приводом. 3.8-литровый оппозитный двигатель мощностью 650 л.с. Разгон до 100 км/ч за 2.7 секунды. Максимальная скорость - 330 км/ч." },
        { id: 3, name: "Aston Martin DBS", brand: "Aston Martin", year: 2022, hp: 715, priceNum: 35000000, priceStr: "35 000 000 ₽", engine: "5.2L V12", img: "3.jpg", description: "Aston Martin DBS - британский гранд-турер с 5.2-литровым V12 мощностью 715 л.с. Разгон до 100 км/ч за 3.4 секунды. Максимальная скорость - 340 км/ч." },
        { id: 4, name: "McLaren 720S", brand: "McLaren", year: 2023, hp: 720, priceNum: 33900000, priceStr: "33 900 000 ₽", engine: "4.0L V8", img: "4.jpg", description: "McLaren 720S - британский суперкар с 4.0-литровым V8 с двойным турбонаддувом мощностью 720 л.с. Разгон до 100 км/ч за 2.9 секунды. Максимальная скорость - 341 км/ч." },
        { id: 5, name: "Mercedes-AMG GT63 S", brand: "Mercedes", year: 2023, hp: 639, priceNum: 21500000, priceStr: "21 500 000 ₽", engine: "4.0L V8", img: "5.jpg", description: "Mercedes-AMG GT63 S - четырехдверное купе с 4.0-литровым V8 мощностью 639 л.с. Разгон до 100 км/ч за 3.2 секунды. Максимальная скорость - 315 км/ч." },
        { id: 6, name: "BMW M8 Competition", brand: "BMW", year: 2023, hp: 625, priceNum: 18990000, priceStr: "18 990 000 ₽", engine: "4.4L V8", img: "6.jpg", description: "BMW M8 Competition - роскошное купе с 4.4-литровым V8 с двойным турбонаддувом мощностью 625 л.с. Разгон до 100 км/ч за 3.2 секунды. Максимальная скорость - 305 км/ч." },
        { id: 7, name: "Audi R8 V10", brand: "Audi", year: 2022, hp: 620, priceNum: 22750000, priceStr: "22 750 000 ₽", engine: "5.2L V10", img: "7.jpg", description: "Audi R8 V10 - спорткар с 5.2-литровым атмосферным V10 мощностью 620 л.с. Разгон до 100 км/ч за 3.2 секунды. Максимальная скорость - 330 км/ч." },
        { id: 8, name: "Nissan GT-R R35", brand: "Nissan", year: 2023, hp: 565, priceNum: 14200000, priceStr: "14 200 000 ₽", engine: "3.8L V6", img: "8.jpg", description: "Nissan GT-R R35 - японский суперкар с 3.8-литровым V6 с двойным турбонаддувом мощностью 565 л.с. Разгон до 100 км/ч за 2.8 секунды. Максимальная скорость - 315 км/ч." },
        { id: 9, name: "Chevrolet Corvette Z06", brand: "Chevrolet", year: 2023, hp: 670, priceNum: 16800000, priceStr: "16 800 000 ₽", engine: "5.5L V8", img: "9.jpg", description: "Chevrolet Corvette Z06 - американский суперкар с 5.5-литровым атмосферным V8 мощностью 670 л.с. Разгон до 100 км/ч за 2.6 секунды. Максимальная скорость - 315 км/ч." },
        { id: 10, name: "Bentley Continental GT Speed", brand: "Bentley", year: 2022, hp: 650, priceNum: 31300000, priceStr: "31 300 000 ₽", engine: "6.0L W12", img: "10.jpg", description: "Bentley Continental GT Speed - роскошное купе с 6.0-литровым W12 с двойным турбонаддувом мощностью 650 л.с. Разгон до 100 км/ч за 3.5 секунды. Максимальная скорость - 335 км/ч." },
        { id: 11, name: "Lamborghini Urus", brand: "Lamborghini", year: 2023, hp: 666, priceNum: 27500000, priceStr: "27 500 000 ₽", engine: "4.0L V8", img: "11.jpg", description: "Lamborghini Urus - премиальный внедорожник с 4.0-литровым V8 с двойным турбонаддувом мощностью 666 л.с. Разгон до 100 км/ч за 3.6 секунды. Максимальная скорость - 305 км/ч." },
        { id: 12, name: "Porsche Taycan Turbo S", brand: "Porsche", year: 2023, hp: 761, priceNum: 19850000, priceStr: "19 850 000 ₽", engine: "Электро", img: "12.jpg", description: "Porsche Taycan Turbo S - электрический спорткар с мощностью 761 л.с. Разгон до 100 км/ч за 2.8 секунды. Максимальная скорость - 260 км/ч. Запас хода - до 412 км." },
        { id: 13, name: "Maserati MC20", brand: "Maserati", year: 2023, hp: 630, priceNum: 26400000, priceStr: "26 400 000 ₽", engine: "3.0L V6", img: "13.jpg", description: "Maserati MC20 - итальянский суперкар с 3.0-литровым V6 с двойным турбонаддувом мощностью 630 л.с. Разгон до 100 км/ч за 2.9 секунды. Максимальная скорость - 325 км/ч." },
        { id: 14, name: "Rolls-Royce Ghost", brand: "Rolls-Royce", year: 2022, hp: 563, priceNum: 48500000, priceStr: "48 500 000 ₽", engine: "6.75L V12", img: "14.jpg", description: "Rolls-Royce Ghost - эталон роскоши с 6.75-литровым V12 с двойным турбонаддувом мощностью 563 л.с. Разгон до 100 км/ч за 4.6 секунды. Максимальная скорость - 250 км/ч." },
        { id: 15, name: "Nissan Skyline GT-R R34", brand: "Nissan", year: 1999, hp: 502, priceNum: 18500000, priceStr: "18 500 000 ₽", engine: "2.6L I12", img: "15.jpg", description: "Nissan Skyline GT-R R34 - легендарный японский спорткар с 2.6-литровым рядным 6-цилиндровым двигателем с двойным турбонаддувом мощностью 502 л.с. Культовый автомобиль из фильма Fast and Furious." },
        { id: 16, name: "BMW M3 Competition", brand: "BMW", year: 2023, hp: 510, priceNum: 16100000, priceStr: "16 100 000 ₽", engine: "3.0L I6", img: "16.jpg", description: "BMW M3 Competition - спортивный седан с 3.0-литровым рядным 6-цилиндровым двигателем с двойным турбонаддувом мощностью 510 л.с. Разгон до 100 км/ч за 3.9 секунды. Максимальная скорость - 290 км/ч." }
    ];

    function renderCatalog() {
        const brand = document.getElementById("brandFilter").value;
        let min = parseInt(document.getElementById("minPrice").value) || 0;
        let max = parseInt(document.getElementById("maxPrice").value) || 50000000;
        let filtered = carsDatabase.filter(car => {
            if (brand !== "all" && !car.brand.includes(brand)) return false;
            return car.priceNum >= min && car.priceNum <= max;
        });
        const grid = document.getElementById("carsGrid");
        if (!grid) return;
        if (filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;">🚫 Нет автомобилей по заданным фильтрам</div>`;
            return;
        }
        grid.innerHTML = filtered.map(car => `
            <div class="car-card">
                <div class="card-img" style="background-image: url('${car.img}'); background-size: cover; background-position: center;">
                    <div class="year-badge">${car.year} • ${car.hp} л.с.</div>
                </div>
                <div class="card-content">
                    <div class="car-name">${car.name}</div>
                    <div class="car-specs">🏁 ${car.hp} HP | ⚙️ ${car.engine}</div>
                    <div class="price">${car.priceStr}</div>
                    <button class="btn-detail" data-id="${car.id}">Подробнее</button>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.btn-detail').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                window.location.href = `car.html?id=${id}`;
            });
        });
    }

    const modal = document.getElementById("contactModal");
    const openBtn = document.getElementById("openContactModalBtn");
    const closeBtn = document.getElementById("closeModalBtn");
    if (openBtn) openBtn.onclick = () => modal.style.display = "flex";
    if (closeBtn) closeBtn.onclick = () => modal.style.display = "none";
    window.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };
    
    const sendContactBtn = document.getElementById("sendContactBtn");
    if (sendContactBtn) {
        sendContactBtn.addEventListener("click", () => {
            const carModel = document.getElementById("contactCarModel").value.trim();
            const question = document.getElementById("contactQuestion").value.trim();
            const phone = document.getElementById("contactPhone").value.trim();
            if(!phone) { alert("Укажите номер телефона для связи"); return; }
            alert(`Сообщение отправлено! Наш менеджер ответит по номеру ${phone} по вопросу: ${carModel || "общий вопрос"}`);
            modal.style.display = "none";
            document.getElementById("contactCarModel").value = "";
            document.getElementById("contactQuestion").value = "";
            document.getElementById("contactPhone").value = "";
        });
    }

    const resetBtn = document.getElementById("resetFilters");
    if (resetBtn) {
        resetBtn.addEventListener("click", () => {
            document.getElementById("brandFilter").value = "all";
            document.getElementById("minPrice").value = "0";
            document.getElementById("maxPrice").value = "50000000";
            renderCatalog();
        });
    }
    const brandFilter = document.getElementById("brandFilter");
    const minPrice = document.getElementById("minPrice");
    const maxPrice = document.getElementById("maxPrice");
    if (brandFilter) brandFilter.addEventListener("change", renderCatalog);
    if (minPrice) minPrice.addEventListener("input", renderCatalog);
    if (maxPrice) maxPrice.addEventListener("input", renderCatalog);
    
    const scrollCatalog = document.getElementById("scrollToCatalogBtn");
    if (scrollCatalog) {
        scrollCatalog.addEventListener("click", () => {
            document.getElementById("catalogAnchor").scrollIntoView({ behavior: "smooth", block: "start" });
        });
    }

    renderCatalog();
</script>
</body>
</html>
